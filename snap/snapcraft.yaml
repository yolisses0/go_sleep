name: go-sleep # you probably want to 'snapcraft register <name>'
base: core24 # the base snap is the execution environment for this snap
version: "0.1" # just for humans, typically '1.2+git' or '1.3.2'
summary: Shuts down the device when you should be sleeping # 79 char long summary
description: |
  Make easy for yourself to have a great sleeping routine by automatically
  turning your computer down. It has some niceties to make sure you won't just
  turn it on back.

grade: devel # must be 'stable' to release into candidate/stable channels
confinement: devmode # use 'strict' once you have the right plugs and slots

parts:
  go-sleep:
    # See 'snapcraft plugins'
    plugin: flutter
    source: .
